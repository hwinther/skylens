# Triages pull requests and applies labels based on the paths modified.
# Config: .github/labeler.yml — https://github.com/actions/labeler
name: Labeler
on:
  pull_request_target:
  pull_request:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"

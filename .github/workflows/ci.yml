name: "Continuous Integration (PR build)"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [opened, reopened, labeled, synchronize, ready_for_review]

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  pr-build:
    permissions:
      contents: read
      checks: write
      pull-requests: write
      packages: read
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    uses: hwinther/reusable-workflows/.github/workflows/pr-build.yml@00fef736b925dfc7b70ab0476276ae1f59e1683b # v2.0.1
    with:
      node_enabled: true
      node_version: "24.x"
      node_working_directory: "app"
      # Include the backend contract so a PR that touches openapi.json re-runs the node job; the extra
      # command regenerates the typed client and the workflow fails on any uncommitted drift.
      node_changes_regex: "app/.*|backend/src/Api/openapi.json"
      node_extra_command: "npm run openapi:generate"
      dotnet_enabled: true
      dotnet_version: "10.0.x"
      dotnet_working_directory: "backend"
      dotnet_solution_file: "Skylens.slnx"
